version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: vanshu-redis
    ports:
      - "6379:6379"
    restart: always

  web:
    build: .
    container_name: vanshu-web
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    restart: always

  worker:
    build: .
    container_name: vanshu-worker
    command: celery -A memory.celery_app worker --loglevel=info --pool=solo
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    restart: always
